<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Text Analyzer</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e6edf3;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 500px;
  background: #111827;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
  margin-bottom: 5px;
}

p {
  color: #9ca3af;
}

input {
  width: 100%;
  margin-top: 15px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.results {
  margin-top: 20px;
  display: flex;
  justify-content: space-between;
}

.metric {
  background: #1f2937;
  padding: 10px;
  border-radius: 8px;
  width: 30%;
  text-align: center;
}

.label {
  font-size: 12px;
  color: #9ca3af;
}

.value {
  font-size: 20px;
  font-weight: bold;
}

.status {
  margin-top: 15px;
  font-size: 14px;
  color: #9ca3af;
}
</style>
</head>

<body>

<div class="card">
  <h1>Text Analyzer</h1>
  <p>Upload a .txt file to analyze text</p>

  <input type="file" accept=".txt" id="fileInput">

  <div class="results">
    <div class="metric">
      <span class="label">Words</span>
      <span class="value" id="wordCount">0</span>
    </div>
    <div class="metric">
      <span class="label">Characters</span>
      <span class="value" id="charCount">0</span>
    </div>
    <div class="metric">
      <span class="label">Lines</span>
      <span class="value" id="lineCount">0</span>
    </div>
  </div>

  <div class="status" id="status">Upload file to begin</div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const wordCountEl = document.getElementById('wordCount');
const charCountEl = document.getElementById('charCount');
const lineCountEl = document.getElementById('lineCount');
const statusEl = document.getElementById('status');

function analyzeText(text) {
  const trimmed = text.trim();
  const wordsArray = trimmed ? trimmed.split(/\s+/) : [];

  const words = wordsArray.length;
  const chars = text.length;
  const lines = text === '' ? 0 : text.split(/\r\n|\r|\n/).length;

  wordCountEl.textContent = words;
  charCountEl.textContent = chars;
  lineCountEl.textContent = lines;

  // Most frequent word
  let freq = {};
  wordsArray.forEach(w => {
    let word = w.toLowerCase();
    freq[word] = (freq[word] || 0) + 1;
  });

  let topWord = "";
  let max = 0;
  for (let w in freq) {
    if (freq[w] > max) {
      max = freq[w];
      topWord = w;
    }
  }

  // Simple summary (first 2 lines)
  const linesArr = text.split(/\r\n|\r|\n/).filter(l => l.trim() !== "");
  const summary = linesArr.slice(0, 2).join(" ");

  statusEl.innerHTML = `
    ✔ File analyzed<br>
    Top word: <b>${topWord || "N/A"}</b><br>
    Summary: ${summary || "No content"}
  `;
}

fileInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (!file.name.endsWith(".txt")) {
    statusEl.textContent = "Please upload a .txt file";
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;
    analyzeText(text);
  };

  reader.onerror = function() {
    statusEl.textContent = "Error reading file";
  };

  reader.readAsText(file);
});
</script>

</body>
</html>
